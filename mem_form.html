<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Federo&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="navbar">
        <a href="index.html"><p class="logo">M</p></a>

        <div class="hamburger" id="hamburger">
            ☰
        </div>

        <div class="options" id="nav-menu">
            <p class="nav-option">Form</p>
            <p class="nav-option">Wall</p>
        </div>
    </div>

    <section>
        <div class="form-container">
            <h2 class="form-head">Our Memories</h2>
            <div class="card">
                <div class="form-group">
                    <label>Enter thumbnail</label>
                    <div id="thumbnail-type">
                        <button class="form-btn" id="img-btn">Upload Image</button>
                        <button class="form-btn" id="sentence-btn">A word or sentence</button>
                    </div>
                </div>

                <label>Your Name</label>
                <input type="text" name="yname" placeholder="Your Name or Anonymous" class="name-text">
                <!-- <button type="submit" class="enter-btn">Enter</button> -->

                <label>Your Memory with me!</label>
                <textarea id="comments" name="comments" placeholder="Your Memory..." required></textarea>
                <button type="submit" class="enter-btn">Enter</button>
            </div>
        </div>
        
    </section>
    <script>
        const hamburger = document.getElementById("hamburger")
        const menu = document.getElementById("nav-menu")

        hamburger.addEventListener("click", function(){
            menu.classList.toggle("active")
        })

        let thumb_type = document.getElementById("thumbnail-type")
        let image_btn = document.getElementById("img-btn")
        let sentence_btn = document.getElementById("sentence-btn")

        image_btn.addEventListener("click", function(){
            let img_upload = `
            <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="upload-img-container">
                <label for="imageUpload" class = "img-text">Select an image:</label>
                <input type="file" id="imageUpload" name="image" accept="image/*" class="image-upload">
            </div>
            </form>

            `
            thumb_type.innerHTML = img_upload
        })
        sentence_btn.addEventListener("click", function(){
            let sen_upload = `
            <form action="/upload" method="POST" enctype="multipart/form-data">
            <label for="sentenceUpload">Select a sen:</label>
            <input type="text" id="textUpload" name="sname" placeholder="Enter 4-5 words" class="name-text">
            </form>
            `
            thumb_type.innerHTML = sen_upload
        })

    </script>
</body>
</html>
