<!DOCTYPE html>
<html>
<head>
<style>

*{
    box-sizing: border-box;
}
.parent {
    width: 300px;
    background: rgb(138, 0, 0);
    padding: 10px;
}

.child {
    background: pink;
    display: inline-block;
    width: 100%;
    /* margin: 0;
    padding: 0; */
}

.box {
  display: inline-block;
  /* width: 100px; */
  height: 100px;
  background: lightblue;
  margin: 5px;
}



</style>
</head>
<body>

<div class="parent">
    <span class="child">hello</span>
</div>

<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>

</body>
</html>
